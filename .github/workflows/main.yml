name: Build Mod
on:
  push:
    branches:
      - 1.0.0/dev
  pull_request:

jobs:
  build:
    runs-on: [self-hosted, linux, arm64]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Grant Gradle executable
        run: chmod +x ./gradlew

      - name: Build Mod
        run: ./gradlew build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: forge-mod
          path: build/libs/*.jar
